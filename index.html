<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="description" content="Recurso educativo interactivo: Términos semejantes - Álgebra 8° - I.E. Merceditas Gómez Martínez, Medellín">
<meta property="og:title" content="Álgebra 8° · Términos semejantes">
<meta property="og:description" content="Reduce términos semejantes con el Mercado de Frutas y contextos reales de Medellín">
<meta property="og:type" content="website">
<title>Álgebra 8° · Sem. 3 · Términos semejantes · I.E. Merceditas Gómez Martínez</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="document.dispatchEvent(new Event('katex-ready'))"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2040;--blue:#1C3A6E;--blue-mid:#2E75B6;
  --green:#2E7D32;--teal:#00695C;--amber:#C47C1A;--red:#B71C1C;
  --green-b:#27AE60;--amber-b:#E08C20;--red-b:#C0392B;
  --cream:#F7F6F2;--warm:#EDECEA;--border:#C0BDB4;
  --text:#1C1C1E;--text2:#3A3A3C;--text3:#6B6B6E;
  --fs-xs:clamp(18px, 1.25vw, 26px);
  --fs-sm:clamp(22px, 1.6vw, 32px);
  --fs-md:clamp(26px, 2vw, 40px);
  --fs-lg:clamp(32px, 2.6vw, 50px);
  --fs-xl:clamp(38px, 3.2vw, 62px);
  --fs-2xl:clamp(48px, 4.2vw, 80px);
  --fs-3xl:clamp(60px, 5.8vw, 105px);
  --gap:clamp(14px, 1.6vw, 22px);
  --pad:clamp(20px, 2.8vw, 40px);
  --line-h:1.55;
}

@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after {
    animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important; scroll-behavior: auto !important;
  }
}
.nbtn:focus, #fs-btn:focus, .video-link:focus, button:focus {
  outline: 3px solid var(--amber-b); outline-offset: 2px;
  box-shadow: 0 0 0 6px rgba(224,140,32,0.3);
}
.sr-only { position:absolute!important; width:1px!important; height:1px!important; padding:0!important; margin:-1px!important; overflow:hidden!important; clip:rect(0,0,0,0)!important; white-space:nowrap!important; border:0!important; }

html,body{width:100%;height:100%;overflow:hidden;background:#0a101e;
  font-family:'DM Sans',system-ui,sans-serif; font-size:16px; line-height:var(--line-h)}
#deck{width:100vw;height:100vh;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;background:var(--cream)}
.slide.active{opacity:1;pointer-events:all}
.slide.enter-r{animation:inR .32s cubic-bezier(.22,.68,0,1.1) forwards}
.slide.enter-l{animation:inL .32s cubic-bezier(.22,.68,0,1.1) forwards}
@keyframes inR{from{transform:translateX(3.5%);opacity:0}to{transform:none;opacity:1}}
@keyframes inL{from{transform:translateX(-3.5%);opacity:0}to{transform:none;opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

header.hdr{background:var(--navy);height:clamp(44px,5.2vh,60px);display:flex;align-items:center;
  padding:0 var(--pad);justify-content:space-between;flex-shrink:0}
.hdr-b{font-size:var(--fs-xs);font-weight:500;color:#A8C4E8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-badge{background:var(--blue);color:#fff;font-size:var(--fs-xs);font-weight:800;
  padding:6px clamp(12px,1.8vw,22px);border-radius:6px;letter-spacing:.08em;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;margin-left:14px}

footer.ftr{background:var(--warm);border-top:2px solid var(--border);height:clamp(36px,4vh,48px);
  display:flex;align-items:center;padding:0 var(--pad);justify-content:space-between;flex-shrink:0}
.ftr span{font-size:var(--fs-xs);color:var(--text3);font-weight:500}

main.body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 0;
  scroll-behavior: smooth;
  padding: clamp(16px,2.2vh,28px) var(--pad) clamp(12px,1.5vh,20px);
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}
main.body::-webkit-scrollbar { width: 6px; }
main.body::-webkit-scrollbar-track { background: transparent; }
main.body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
main.body::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }

.s-portada{background:var(--blue)}
.portada-inner{width:100%;max-width:1400px;margin:0 auto;
  padding:clamp(36px,6vh,80px) clamp(48px,7vw,100px);
  display:flex;flex-direction:column;gap:clamp(16px,2.8vh,32px)}
.p-ie{font-size:var(--fs-sm);color:rgba(180,210,240,.85);text-align:center;letter-spacing:.05em}
.p-area{font-size:var(--fs-md);font-weight:700;color:rgba(180,210,240,.95);
  text-align:center;letter-spacing:.16em;text-transform:uppercase}
.p-title{font-family:'DM Serif Display',serif;font-size:var(--fs-3xl);
  color:#fff;text-align:center;line-height:1.05;animation:fadeUp .9s .1s both}
.p-sub{font-size:var(--fs-xl);color:rgba(200,228,255,.9);text-align:center;
  font-style:italic;animation:fadeUp .9s .25s both}
.p-divider{height:3px;background:rgba(255,255,255,.25);border-radius:2px; margin:clamp(8px,1.5vh,14px) 0}
.p-card-grid{display:grid;grid-template-columns:repeat(3,1fr);
  gap:clamp(12px,1.4vw,20px);animation:fadeUp .9s .4s both}
.p-card{background:rgba(255,255,255,.09);border:2px solid rgba(255,255,255,.18);
  border-radius:14px;padding:clamp(18px,2.2vh,30px) clamp(14px,1.8vw,24px);
  display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.p-card-num{width:clamp(48px,5vw,64px);height:clamp(48px,5vw,64px);border-radius:50%;
  background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;
  font-size:var(--fs-lg);font-weight:700;color:#fff}
.p-card-title{font-size:var(--fs-lg);font-weight:700;color:#fff;line-height:1.15}
.p-card-sub{font-size:var(--fs-sm);color:rgba(200,228,255,.8);font-style:italic;line-height:1.4}
.p-docente{font-size:var(--fs-sm);color:rgba(180,210,240,.7);text-align:right;font-style:italic}

.title-row{display:flex;align-items:flex-start;gap:16px}
.accent-bar{width:clamp(10px,1vw,14px);border-radius:6px;flex-shrink:0;align-self:stretch;min-height:48px}
.slide-title{font-family:'DM Serif Display',serif;
  font-size:var(--fs-xl);color:var(--navy);line-height:1.08}
.slide-instr{font-size:var(--fs-md);color:var(--text2);font-style:italic;margin-top:6px;line-height:1.4}
.badge{display:inline-flex;align-items:center;font-size:var(--fs-sm);font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;padding:6px 16px;border-radius:6px;margin-bottom:4px}

.activacion-previa{
  background:var(--warm);border-left:5px solid var(--blue-mid);
  border-radius:0 10px 10px 0;padding:clamp(14px,1.6vh,22px) clamp(16px,2vw,28px);
  font-size:var(--fs-md);color:var(--text2);margin-bottom:var(--gap);
  font-style:italic}
.activacion-previa strong{color:var(--navy);font-style:normal}

.det-box{background:#FFF8ED;border:3px solid var(--amber);border-radius:14px;
  padding:clamp(16px,2vh,24px) clamp(18px,2.2vw,30px);
  display:flex;flex-direction:column;gap:clamp(10px,1.4vh,16px)}
.det-label{font-size:var(--fs-sm);font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;color:var(--amber)}
.det-text{font-family:'DM Serif Display',serif;
  font-size:var(--fs-lg);color:var(--text);line-height:1.55;font-style:italic}
.det-q{font-size:var(--fs-xl);font-weight:800;color:var(--navy);line-height:1.35}

.conexion-ciencias{
  background:#E3F2FD;border-left:5px solid var(--blue-mid);
  border-radius:0 10px 10px 0;padding:clamp(12px,1.4vh,18px) clamp(16px,2vw,28px);
  font-size:var(--fs-sm);color:var(--text2);margin-top:10px; line-height:1.6}

.maquina-layout{display:flex;gap:clamp(18px,2.2vw,34px);align-items:flex-start}
.maquina-left{
  background:var(--navy);border-radius:14px;
  padding:clamp(18px,2.2vh,30px) clamp(20px,2.4vw,32px);
  display:flex;flex-direction:column;gap:clamp(12px,1.4vh,20px);
  flex:0 0 auto;width:clamp(240px,24vw,320px);align-items:center}
.maq-title{font-size:var(--fs-sm);font-weight:800;color:#A8C4E8;
  text-transform:uppercase;letter-spacing:.12em;text-align:center}
.maq-expr{font-family:'DM Serif Display',serif;
  font-size:var(--fs-2xl);color:var(--amber-b);text-align:center;font-weight:400}
.maq-arrow{font-size:var(--fs-xl);color:rgba(255,255,255,.5);text-align:center}
.maq-io{display:flex;flex-direction:column;gap:10px;width:100%}
.maq-slot{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);
  border-radius:10px;padding:clamp(10px,1.2vh,16px) clamp(12px,1.5vw,18px);
  display:flex;justify-content:space-between;align-items:center;gap:12px}
.maq-slot-lbl{font-size:var(--fs-xs);color:#A8C4E8;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.maq-slot-val{font-size:var(--fs-lg);font-weight:800;color:#fff}
.maquina-right{flex:1;display:flex;flex-direction:column;gap:clamp(10px,1.2vh,16px);min-width:0}

.sust-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.sust-table th{background:var(--navy);color:#fff;
  padding:clamp(10px,1.2vh,16px) clamp(12px,1.5vw,18px);text-align:center;font-size:var(--fs-sm)}
.sust-table td{padding:clamp(9px,1.1vh,14px) clamp(12px,1.5vw,18px);
  border-bottom:2px solid var(--border);text-align:center;
  color:var(--text);font-size:var(--fs-md)}
.sust-table tr:nth-child(even) td{background:#fff}
.sust-table tr:nth-child(odd) td{background:var(--warm)}
.sust-table .paso-col{font-size:var(--fs-md);color:var(--text2);
  font-style:italic;text-align:left}

.paso-row{display:flex;align-items:center;gap:clamp(12px,1.4vw,20px);
  background:#fff;border:2px solid var(--border);border-radius:12px;
  padding:clamp(12px,1.4vh,20px) clamp(16px,2vw,26px);border-left:6px solid var(--blue);
  opacity:0;transform:translateY(14px);transition:opacity .4s,transform .4s}
.paso-row.vis{opacity:1;transform:none}
.paso-num{width:clamp(32px,3.4vw,48px);height:clamp(32px,3.4vw,48px);border-radius:50%;
  background:var(--blue);display:flex;align-items:center;justify-content:center;
  font-size:var(--fs-md);font-weight:800;color:#fff;flex-shrink:0}
.paso-lbl{font-size:var(--fs-sm);font-weight:800;color:var(--blue);
  flex-shrink:0;min-width:clamp(110px,12vw,160px)}
.paso-body{font-size:var(--fs-md);color:var(--text);flex:1;line-height:1.4}
.paso-note{font-size:var(--fs-xs);color:var(--text3);font-style:italic;
  text-align:right;flex-shrink:0}

.result-bar{background:var(--navy);border-radius:12px;
  padding:clamp(14px,1.8vh,24px) clamp(18px,2.2vw,30px);
  display:flex;align-items:center;justify-content:center;gap:20px;
  font-size:var(--fs-2xl);font-weight:800;color:var(--amber-b);text-align:center;
  opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s}
.result-bar.vis{opacity:1;transform:none}

.error-box{background:#FFF0F0;border:3px solid var(--red);border-radius:14px;
  padding:clamp(14px,1.8vh,22px) clamp(16px,2vw,26px);
  display:flex;flex-direction:column;gap:clamp(8px,1vh,12px)}
.error-title{font-size:var(--fs-sm);font-weight:800;color:var(--red)}
.error-txt{font-size:var(--fs-sm);color:var(--text);line-height:1.55}

.formal-box{background:var(--warm);border:3px solid var(--green);border-radius:14px;
  padding:clamp(16px,2vh,28px) clamp(18px,2.2vw,32px);
  display:flex;flex-direction:column;gap:clamp(14px,1.8vh,22px);
  align-items:stretch}
.formal-title{font-size:var(--fs-lg);font-weight:800;color:var(--green);text-align:center}
.formal-step{background:#fff;border:2px solid var(--border);border-radius:10px;
  padding:clamp(12px,1.4vh,20px) clamp(16px,2vw,24px);
  display:flex;align-items:center;gap:16px;width:100%;
  opacity:0;transition:opacity .4s}
.formal-step.vis{opacity:1}
.formal-step-n{width:clamp(32px,3.4vw,44px);height:clamp(32px,3.4vw,44px);border-radius:50%;
  background:var(--green);display:flex;align-items:center;justify-content:center;
  font-size:var(--fs-md);font-weight:800;color:#fff;flex-shrink:0}
.formal-step-txt{font-size:var(--fs-md);color:var(--text);line-height:1.4}
.conj-box{background:#E8F5E9;border:3px solid var(--green);border-radius:12px;
  padding:clamp(12px,1.4vh,20px) clamp(16px,2vw,24px);
  font-size:var(--fs-md);color:var(--green);font-style:italic;line-height:1.5}

.espacio-respuesta{
  background:#fff;border:2.5px dashed var(--border);border-radius:10px;
  padding:clamp(12px,1.4vh,18px) clamp(14px,1.8vw,22px);
  font-size:var(--fs-md);color:var(--text);min-height:clamp(80px,10vh,120px);
  margin:var(--gap) 0;font-style:italic}
.espacio-respuesta:focus{
  border-color:var(--blue-mid);outline:none;box-shadow:0 0 0 4px rgba(46,117,182,0.25)}

.checkpoint{
  background:#E8F4FD;border:2.5px solid var(--blue-mid);border-radius:12px;
  padding:clamp(12px,1.4vh,18px) clamp(14px,1.8vw,22px);
  margin:var(--gap) 0;font-size:var(--fs-sm); line-height:1.6}
.checkpoint strong{color:var(--navy);display:block;margin-bottom:8px}
.checkpoint .pista{
  background:#fff;padding:10px 14px;border-radius:8px;margin-top:10px;
  border-left:4px solid var(--amber);font-style:italic;color:var(--text2)}
.checkpoint button{
  background:var(--blue-mid);color:#fff;border:none;padding:6px 14px;
  border-radius:6px;font-size:var(--fs-xs);cursor:pointer;margin-top:8px; font-weight:600}
.checkpoint button:hover{background:var(--blue)}

.botones-diferenciacion{display:flex;gap:10px;flex-wrap:wrap;margin:var(--gap) 0}
.btn-ayuda,.btn-desafio{
  font-size:var(--fs-xs);padding:8px 16px;border-radius:24px;
  border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
  transition:transform .1s,box-shadow .2s; font-weight:600}
.btn-ayuda{background:#E8F5E9;color:var(--green);border:2.5px solid var(--green)}
.btn-ayuda:hover{background:#C8E6C9;transform:translateY(-2px);box-shadow:0 4px 8px rgba(0,0,0,0.1)}
.btn-desafio{background:#FFF3E0;color:var(--amber);border:2.5px solid var(--amber)}
.btn-desafio:hover{background:#FFE0B2;transform:translateY(-2px);box-shadow:0 4px 8px rgba(0,0,0,0.1)}
.contenido-ayuda,.contenido-desafio{
  display:none;background:var(--warm);border-radius:10px;
  padding:clamp(12px,1.4vh,18px) clamp(14px,1.8vw,22px);
  margin:10px 0;font-size:var(--fs-sm);border-left:5px solid var(--blue-mid); line-height:1.6}
.contenido-ayuda.visible,.contenido-desafio.visible{display:block;animation:fadeUp .3s}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(min(100%, 280px), 1fr));
  gap:clamp(10px,1vw,16px)}
.ex-card{background:#fff;border-radius:14px;border:2.5px solid var(--border);
  border-top:6px solid transparent;
  padding:clamp(14px,1.8vh,22px) clamp(14px,1.8vw,22px);
  display:flex;flex-direction:column;gap:clamp(10px,1.2vh,14px);
  opacity:0;transform:translateY(16px);transition:opacity .45s,transform .45s}
.ex-card.vis{opacity:1;transform:none}
.ex-head{display:flex;align-items:center;gap:14px}
.ex-num{width:clamp(32px,3.4vw,48px);height:clamp(32px,3.4vw,48px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:var(--fs-md);color:#fff;flex-shrink:0}
.ex-title{font-size:var(--fs-md);font-weight:800;color:var(--text)}
.ex-ctx{font-size:var(--fs-sm);color:var(--text2);font-style:italic;line-height:1.4}
.ex-task{background:var(--warm);border-radius:10px;
  padding:clamp(12px,1.4vh,18px) clamp(14px,1.8vw,20px);
  font-size:var(--fs-lg);font-weight:800;color:var(--navy);text-align:center;
  border:2px solid var(--border)}

.comp-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.comp-table th{background:var(--blue);color:#fff;
  padding:clamp(10px,1.2vh,16px) clamp(12px,1.5vw,20px);text-align:left}
.comp-table td{padding:clamp(10px,1.2vh,15px) clamp(12px,1.5vw,20px);
  border-bottom:2px solid var(--border);color:var(--text);
  vertical-align:top;line-height:1.4}
.comp-table tr:nth-child(even) td{background:#fff}
.comp-table tr:nth-child(odd) td{background:var(--warm)}
.comp-table td:first-child{font-weight:800;color:var(--blue);background:#EBF4FB!important}

/* Slide 7 — filas de tabla con transición */
.comp-table tr.tabla-row{opacity:0;transition:opacity .4s}
.comp-table tr.tabla-row.vis{opacity:1}

.slide-7-layout{display:flex;gap:var(--gap);align-items:flex-start;flex-wrap:wrap}
.slide-7-col{flex:1;min-width:min(100%, 320px);display:flex;flex-direction:column;gap:var(--gap)}

.meta-q{background:#E0F2F1;border:3px solid var(--teal);border-radius:14px;
  padding:clamp(14px,1.8vh,24px) clamp(16px,2vw,28px)}
.meta-qlbl{font-size:var(--fs-xs);font-weight:800;color:var(--teal);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.meta-qtxt{font-family:'DM Serif Display',serif;
  font-size:var(--fs-xl);color:var(--text);font-style:italic;line-height:1.55}
.semaforo{display:flex;flex-direction:column;gap:clamp(12px,1.4vh,20px)}
.sema-item{display:flex;align-items:flex-start;gap:18px;background:#fff;
  border-radius:12px;padding:clamp(14px,1.8vh,22px) clamp(16px,2vw,26px);
  border:2.5px solid var(--border);
  opacity:0;transform:translateX(16px);transition:opacity .45s,transform .45s}
.sema-item.vis{opacity:1;transform:none}
.sema-circle{width:clamp(50px,5.5vw,74px);height:clamp(50px,5.5vw,74px);
  border-radius:50%;flex-shrink:0}
.sema-txt{font-size:var(--fs-md);color:var(--text);line-height:1.35}
.sema-sub{display:block;font-size:var(--fs-sm);color:var(--text3);
  margin-top:4px;font-style:italic}

.video-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(min(100%, 300px), 1fr));
  gap:clamp(10px,1vw,16px)}
.video-card{background:#fff;border:2.5px solid var(--border);border-radius:12px;
  padding:clamp(12px,1.4vh,20px) clamp(14px,1.8vw,22px);
  display:flex;flex-direction:column;gap:10px;
  border-top:5px solid var(--blue-mid)}
.video-lbl{font-size:var(--fs-xs);font-weight:800;color:var(--blue-mid);
  text-transform:uppercase;letter-spacing:.1em}
.video-title{font-size:var(--fs-md);font-weight:800;color:var(--navy);line-height:1.3}
.video-desc{font-size:var(--fs-sm);color:var(--text2);font-style:italic;line-height:1.4}
.video-link{display:inline-flex;align-items:center;gap:8px;margin-top:6px;
  font-size:var(--fs-sm);font-weight:700;color:var(--blue-mid);text-decoration:none;
  background:#EBF4FB;padding:8px 16px;border-radius:8px;transition:background .2s}

<script>
function announceToScreenReader(message) {
  const region = document.getElementById('live-region');
  if (region) { region.textContent = ''; setTimeout(() => { region.textContent = message; }, 100); }
}
function showFeedback(message, isError = false) {
  const fb = document.getElementById('feedback');
  if (!fb) return;
  fb.textContent = message;
  fb.className = 'feedback-msg' + (isError ? ' error' : '') + ' show';
  setTimeout(() => { fb.classList.remove('show'); }, 3000);
}
function saveProgress(slideIndex, clicks) {
  try { localStorage.setItem('algebra8_sem3_progress', JSON.stringify({ slide: slideIndex, clicks: clicks, timestamp: Date.now() })); }
  catch(e) { console.warn('No se pudo guardar el progreso:', e); }
}
function loadProgress() {
  try {
    const saved = localStorage.getItem('algebra8_sem3_progress');
    if (saved) { const data = JSON.parse(saved); if (Date.now() - data.timestamp < 86400000) return data; }
  } catch(e) { console.warn('No se pudo cargar el progreso:', e); }
  return null;
}
function toggleContent(btn, targetClass) {
  const card = btn.closest('.ex-card') || btn.closest('.formal-box') || document.body;
  const content = card.querySelector('.' + targetClass);
  if (content) {
    content.classList.toggle('visible');
    const isExpanded = content.classList.contains('visible');
    btn.setAttribute('aria-expanded', isExpanded);
    announceToScreenReader(isExpanded ? 'Contenido adicional visible' : 'Contenido adicional oculto');
  }
}
function togglePista(btn) {
  const pista = btn.nextElementSibling;
  if(pista && pista.classList.contains('pista')) {
    const isHidden = pista.hasAttribute('hidden');
    pista.hidden = !isHidden;
    btn.textContent = isHidden ? 'Ocultar pista' : 'Ver pista';
    announceToScreenReader(isHidden ? 'Pista mostrada' : 'Pista oculta');
  }
}
function verificarRespuesta(ejercicioId, respuestaEsperada, inputSelector) {
  const input = document.querySelector(inputSelector);
  if (!input) return;
  const valor = input.value.trim().replace(/\s+/g, '');
  const esperada = respuestaEsperada.toString().trim().replace(/\s+/g, '');
  if (valor === esperada) {
    showFeedback('¡Correcto! 🎉 Bien hecho.');
    announceToScreenReader('Respuesta correcta');
    input.style.borderColor = 'var(--green)'; input.style.backgroundColor = '#E8F5E9';
  } else {
    showFeedback('Casi... Revisa los signos y paréntesis. ', true);
    announceToScreenReader('Respuesta incorrecta. Intenta de nuevo');
    input.style.borderColor = 'var(--red)'; input.style.backgroundColor = '#FFF0F0';
  }
}
function exportarEvidencia() {
  const respuestas = [];
  document.querySelectorAll('.espacio-respuesta').forEach((el, i) => { if(el.textContent.trim()) respuestas.push(`Espacio ${i+1}: ${el.textContent.trim()}`); });
  if(respuestas.length === 0) { showFeedback('Escribe primero en los espacios de respuesta 💡', true); return; }
  const contenido = `EVIDENCIAS - Álgebra 8° - Términos semejantes\n${new Date().toLocaleString('es-CO')}\n\n${respuestas.join('\n\n---\n\n')}`;
  try {
    const blob = new Blob([contenido], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `algebra8_evidencias_${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showFeedback('📥 Evidencias guardadas exitosamente'); announceToScreenReader('Archivo de evidencias descargado');
  } catch(e) { console.log(contenido); navigator.clipboard?.writeText(contenido); showFeedback('📋 Contenido copiado al portapapeles'); announceToScreenReader('Evidencias copiadas al portapapeles'); }
}
function guardarReflexion() {
  const reflexion = document.querySelector('.meta-q + .espacio-respuesta');
  const semaforo = document.querySelector('.sema-item.vis');
  let mensaje = 'Reflexión guardada:\n';
  if(reflexion?.textContent.trim()) mensaje += `• Mi reflexión: ${reflexion.textContent.trim()}\n`;
  if(semaforo) {
    const color = semaforo.querySelector('.sema-circle').style.background;
    const texto = semaforo.querySelector('.sema-txt')?.textContent.trim();
    mensaje += `• Semáforo: ${color} - ${texto}`;
  }
  console.log(mensaje); navigator.clipboard?.writeText(mensaje);
  showFeedback('💾 Reflexión y semáforo guardados'); announceToScreenReader('Tu reflexión ha sido guardada');
}


var mfSel=null;
function mfPick(el){
  if(el.dataset.done) return;
  if(mfSel && document.body.contains(mfSel)) mfSel.style.outline='';
  mfSel=el; el.style.outline='3px solid #C47C1A'; el.style.outlineOffset='2px';
  var msg=document.getElementById('mf-msg');
  if(msg){ msg.textContent='Fruta seleccionada: ahora toca su canasta.'; msg.style.color='var(--text2)'; }
}
function mfExp(){
  var m=document.getElementById('mf-m'), a=document.getElementById('mf-a'), e=document.getElementById('mf-exp');
  if(m&&a&&e){ e.textContent = m.textContent+'m + '+a.textContent+'a'; }
}
function mfDrop(bin){
  var msg=document.getElementById('mf-msg');
  if(mfSel && !document.body.contains(mfSel)) mfSel=null;
  if(!mfSel){ if(msg){ msg.textContent='Primero toca una fruta de la lista.'; msg.style.color='var(--amber)'; } return; }
  var k=mfSel.dataset.k;
  if(k!==bin){
    if(msg){ msg.innerHTML='\u2717 Esa fruta no va ah\u00ed: <strong>'+(k==='m'?'mango':'aguacate')+'</strong> y <strong>'+(bin==='m'?'mango':'aguacate')+'</strong> no son semejantes.'; msg.style.color='var(--red)'; }
    mfSel.style.outline=''; mfSel=null;
    if(window.announceToScreenReader) announceToScreenReader('No son semejantes');
    return;
  }
  mfSel.dataset.done='1'; mfSel.style.opacity='.3'; mfSel.style.pointerEvents='none'; mfSel.style.outline='';
  var c=document.getElementById('mf-'+bin); if(c){ c.textContent=(parseInt(c.textContent,10)||0)+1; }
  mfSel=null; mfExp();
  if(msg){ msg.textContent='\u2713 Bien: se juntan las del mismo tipo.'; msg.style.color='var(--green)'; }
}
function mfCheck(){
  var pool=document.getElementById('mf-pool'), m=document.getElementById('mf-m'), a=document.getElementById('mf-a'), msg=document.getElementById('mf-msg');
  if(!pool||!m||!a||!msg) return;
  var em=parseInt(pool.dataset.em,10), ea=parseInt(pool.dataset.ea,10);
  var gm=parseInt(m.textContent,10), ga=parseInt(a.textContent,10);
  if(gm+ga < em+ea){ msg.textContent='A\u00fan faltan frutas por guardar en su canasta.'; msg.style.color='var(--amber)'; return; }
  msg.innerHTML='\u2713 \u00a1Compra reducida! <strong>'+em+'m + '+ea+'a</strong>. No es '+(em+ea)+' \u00abfrutas\u00bb sueltas: son dos grupos distintos.';
  msg.style.color='var(--green)';
  if(window.showFeedback) showFeedback('\u00a1Correcto! \ud83c\udf89 Redujiste la compra a '+em+'m + '+ea+'a.');
  if(window.announceToScreenReader) announceToScreenReader('Compra reducida correctamente');
}
function mfReset(){
  var m=document.getElementById('mf-m'), a=document.getElementById('mf-a'), msg=document.getElementById('mf-msg');
  if(m) m.textContent='0'; if(a) a.textContent='0'; if(msg) msg.textContent='';
  document.querySelectorAll('#mf-pool .mf-fruit').forEach(function(el){ el.dataset.done=''; el.style.opacity='1'; el.style.pointerEvents='auto'; el.style.outline=''; });
  mfSel=null; mfExp();
}

var VOT_FB="https://fracciones-merceditas-default-rtdb.firebaseio.com";
var VOT_NS="semejantes";
var VOT_CORRECT={1:'si',2:'no',3:'no',4:'si',5:'si',6:'no'};
var votTimer=null;
function votDate(){ return new Date().toISOString().slice(0,10); }
function votInit(){ if(votTimer) clearInterval(votTimer); votPoll(); votTimer=setInterval(votPoll,2500); }
function votPoll(){
  var grid=document.getElementById('vot-grid');
  if(!grid){ if(votTimer) clearInterval(votTimer); return; }
  fetch(VOT_FB+'/'+VOT_NS+'/'+votDate()+'.json').then(function(r){return r.json();})
    .then(function(all){ votRender(all||{}); }).catch(function(){});
}
function votRender(all){
  var total=0;
  for(var q=1;q<=6;q++){
    var obj=all['q'+q]||{}; var si=0,no=0;
    for(var k in obj){ if(obj[k]==='si')si++; else if(obj[k]==='no')no++; }
    total+=si+no; var tot=si+no, ps=tot?Math.round(si/tot*100):0, pn=tot?100-ps:0;
    var sb=document.getElementById('vot-si-'+q), nb=document.getElementById('vot-no-'+q);
    var sc=document.getElementById('vot-sc-'+q), nc=document.getElementById('vot-nc-'+q);
    if(sb) sb.style.width=ps+'%'; if(nb) nb.style.width=pn+'%';
    if(sc) sc.textContent=si; if(nc) nc.textContent=no;
  }
  var liveEl=document.getElementById('vot-live');
  if(liveEl) liveEl.textContent = total>0 ? ('\ud83d\udfe2 EN VIVO \u00b7 '+total+' votos') : '\u26aa Esperando votos\u2026';
}
function votReveal(q){
  var correct=VOT_CORRECT[q]; var card=document.getElementById('vot-card-'+q); if(!card) return;
  var win=card.querySelector('.vot-'+correct+'-row'); if(win){ win.style.outline='3px solid var(--green)'; win.style.borderRadius='8px'; }
  var lose=card.querySelector('.vot-'+(correct==='si'?'no':'si')+'-row'); if(lose) lose.style.opacity='.4';
  var btn=card.querySelector('.vot-reveal'); if(btn){ btn.textContent='\u2713 '+(correct==='si'?'Semejantes':'No'); btn.style.background='var(--green)'; btn.style.color='#fff'; btn.style.borderColor='var(--green)'; }
}
function votDemo(){
  var date=votDate();
  for(var q=1;q<=6;q++){ var correct=VOT_CORRECT[q];
    for(var i=0;i<12;i++){ var choice=Math.random()<0.72?correct:(correct==='si'?'no':'si');
      fetch(VOT_FB+'/'+VOT_NS+'/'+date+'/q'+q+'/demo'+i+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(choice)}); } }
  setTimeout(votPoll,900);
}
function votReset(){ if(!confirm('\u00bfBorrar todos los votos de hoy?')) return;
  fetch(VOT_FB+'/'+VOT_NS+'/'+votDate()+'.json',{method:'DELETE'}).then(function(){ setTimeout(votPoll,500); }); }

{bread:'Sem. 3  ·  Términos semejantes  ›  Formalización',badge:'FORMALIZACIÓN',clicks:5,fL:'Sem. 3 · Sesión 2 · Formalización',html:`

  </div>
</div>
<div class="formal-box">
  <div class="formal-title">Procedimiento formal: reducir términos semejantes</div>
  <div class="contenido-ayuda"><strong>Ejemplo guiado:</strong> en \\(7x + 2x\\) la parte literal es la misma (\\(x\\)), así que se suman los coeficientes: \\(7+2=9 \\Rightarrow 9x\\).</div>
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:4px 0">
    <button type="button" class="btn-ayuda" onclick="toggleContent(this,'contenido-ayuda')" aria-expanded="false">💡 ¿Necesitas ayuda?</button>
  </div>
  <div class="formal-step" data-c="1"><div class="formal-step-n">1</div><div class="formal-step-txt"><strong>Identifica la parte literal</strong> de cada término: las variables con sus exponentes (el coeficiente no cuenta para decidir semejanza).</div></div>
  <div class="formal-step" data-c="2"><div class="formal-step-n">2</div><div class="formal-step-txt"><strong>Agrupa</strong> los términos que tienen idéntica parte literal (misma variable y mismo exponente).</div></div>
  <div class="formal-step" data-c="3"><div class="formal-step-n">3</div><div class="formal-step-txt"><strong>Suma o resta solo los coeficientes</strong> de cada grupo; la parte literal se conserva sin cambios.</div></div>
  <div class="formal-step" data-c="4"><div class="formal-step-n">4</div><div class="formal-step-txt"><strong>Deja igual</strong> los términos que no tienen semejantes. El resultado es la expresión reducida.</div></div>
  <div class="check-box" data-c="5" style="width:100%">✔ Regla de oro: la parte literal es como el «apellido» del término. Solo se juntan los términos del mismo apellido — \\(x\\) y \\(x^2\\) son apellidos diferentes.</div>
</div>`,

  }
  h+=`<main class="body">${s.html}</main>`;
  if(!s.noF) h+=`<footer class="ftr"><span>${s.fL||''}</span><span>I.E. Merceditas Gómez Martínez · Álgebra 8°</span></footer>`;
  d.innerHTML=h; return d;
}

function show(idx,dir){
  const prev=deck.querySelector('.slide.active');
  if(prev) { prev.classList.remove('active','enter-r','enter-l'); prev.querySelectorAll('input').forEach(inp => inp.replaceWith(inp.cloneNode(true))); }
  const el=buildSlide(idx); deck.appendChild(el);
  const all=deck.querySelectorAll('.slide'); if(all.length>3) all[0].remove();
  requestAnimationFrame(()=>{
    el.classList.add('active',dir>=0?'enter-r':'enter-l');
    setTimeout(()=>el.classList.remove('enter-r','enter-l'),360);
    doKatex(el); if(SLIDES[idx].onEnter) SLIDES[idx].onEnter();
    const title = el.querySelector('.slide-title');
    if(title) announceToScreenReader(`Diapositiva ${idx+1}: ${title.textContent}`);
    else announceToScreenReader(`Diapositiva ${idx+1} de ${SLIDES.length}`);
    const main = el.querySelector('main.body');
    if(main) main.scrollTop = 0;
  });
  clicks=0;
  document.getElementById('ncnt').textContent=`${idx+1} / ${SLIDES.length}`;
  document.getElementById('pbar').style.width=(((idx+1)/SLIDES.length)*100)+'%';
  document.getElementById('pbar').setAttribute('aria-valuenow', idx+1);
  saveProgress(idx, 0);
}

function doKatex(el){
  if(window.renderMathInElement) renderMathInElement(el,{
    delimiters:[{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true},{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
    throwOnError:false, macros:{"\\ee":"\\mathrm{e}"}
  });
}

function advance(){
  const s=SLIDES[cur];
  const maxClicks = s.clicks || 0;
  if(clicks < maxClicks){
    clicks++;
    if(s.onReveal) s.onReveal(clicks);
    announceToScreenReader(`Paso ${clicks} de ${maxClicks}`);
    saveProgress(cur, clicks);
    return;
  }
  if(cur<SLIDES.length-1){ cur++; show(cur,1); }
  else { showFeedback('¡Has completado la lección! 🎉 Revisa tus evidencias guardadas.'); announceToScreenReader('Lección completada. Puedes repasar las diapositivas o guardar tus evidencias.'); }
}
function retreat(){ if(cur>0){ cur--; show(cur,-1); } }

document.addEventListener('keydown',e=>{
  if(['Space','ArrowRight','ArrowLeft'].includes(e.code)) e.preventDefault();
  if(e.code==='Space'||e.code==='ArrowRight') advance();
  if(e.code==='ArrowLeft') retreat();
  if(e.code==='KeyF') document.getElementById('fs-btn')?.click();
});

const btnNext = document.getElementById('bn');
const btnPrev = document.getElementById('bp');
if(btnNext) btnNext.addEventListener('click', advance);
if(btnPrev) btnPrev.addEventListener('click', retreat);

let tx=0;
document.addEventListener('touchstart',e=>{ if(e.touches?.[0]) tx = e.touches[0].clientX; },{passive:true});
document.addEventListener('touchend',e=>{
  const touch = e.changedTouches?.[0]; if(!touch) return;
  const dx = touch.clientX - tx;
  if(Math.abs(dx) > 50) { dx < 0 ? advance() : retreat(); }
});

const fsBtn = document.getElementById('fs-btn');
if(fsBtn) {
  fsBtn.addEventListener('click', async () => {
    try {
      if(!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    } catch(err) { console.warn('Fullscreen no disponible:', err); showFeedback('Pantalla completa no disponible en este dispositivo', true); }
  });
  document.addEventListener('fullscreenchange', () => {
    if(fsBtn) fsBtn.textContent = document.fullscreenElement ? '✕' : '⛶';
    fsBtn?.setAttribute('aria-label', document.fullscreenElement ? 'Salir de pantalla completa' : 'Entrar en pantalla completa');
  });
}

setTimeout(()=>{ const hint = document.getElementById('hint'); if(hint) hint.style.opacity='0'; },5000);
document.addEventListener('katex-ready',()=>{ const a=deck.querySelector('.slide.active'); if(a) doKatex(a); });
show(savedProgress?.slide || 0, 1);
window.addEventListener('beforeunload', () => { const saved = loadProgress(); if(saved && Date.now() - saved.timestamp > 86400000) localStorage.removeItem('algebra8_sem3_progress'); });
</script>
