<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="description" content="Recurso educativo interactivo: Suma y resta de polinomios - Álgebra 8° - I.E. Merceditas Gómez Martínez, Medellín">
<meta property="og:title" content="Álgebra 8° · Suma y Resta de Polinomios">
<meta property="og:description" content="Aprende a sumar y restar polinomios con contextos reales de Medellín">
<meta property="og:type" content="website">
<title>Álgebra 8° · Sem. 4 · Suma y Resta de Polinomios · I.E. Merceditas Gómez Martínez</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="window._katexReady=true;document.dispatchEvent(new Event('katex-ready'))"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2040;--blue:#1C3A6E;--blue-mid:#2E75B6;
  --green:#2E7D32;--teal:#00695C;--amber:#C47C1A;--red:#7B1818;
  --green-b:#27AE60;--amber-b:#E08C20;--red-b:#9B2020;
  --cream:#F7F6F2;--warm:#EDECEA;--border:#C0BDB4;
  --text:#1C1C1E;--text2:#3A3A3C;--text3:#6B6B6E;
  --fs-xs:clamp(18px, 1.25vw, 26px);
  --fs-sm:clamp(22px, 1.6vw, 32px);
  --fs-md:clamp(26px, 2vw, 40px);
  --fs-lg:clamp(32px, 2.6vw, 50px);
  --fs-xl:clamp(38px, 3.2vw, 62px);
  --fs-2xl:clamp(48px, 4.2vw, 80px);
  --fs-3xl:clamp(60px, 5.8vw, 105px);
  --gap:clamp(14px, 1.6vw, 22px);
  --pad:clamp(20px, 2.8vw, 40px);
  --line-h:1.55;
}

@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after {
    animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important; scroll-behavior: auto !important;
  }
}
.nbtn:focus, #fs-btn:focus, .video-link:focus, button:focus {
  outline: 3px solid var(--amber-b); outline-offset: 2px;
  box-shadow: 0 0 0 6px rgba(224,140,32,0.3);
}
.sr-only { position:absolute!important; width:1px!important; height:1px!important; padding:0!important; margin:-1px!important; overflow:hidden!important; clip:rect(0,0,0,0)!important; white-space:nowrap!important; border:0!important; }

html,body{width:100%;height:100%;overflow:hidden;background:#0a101e;
  font-family:'DM Sans',system-ui,sans-serif; font-size:16px; line-height:var(--line-h)}
#deck{width:100vw;height:100vh;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;background:var(--cream)}
.slide.active{opacity:1;pointer-events:all}
.slide.enter-r{animation:inR .32s cubic-bezier(.22,.68,0,1.1) forwards}
.slide.enter-l{animation:inL .32s cubic-bezier(.22,.68,0,1.1) forwards}
@keyframes inR{from{transform:translateX(3.5%);opacity:0}to{transform:none;opacity:1}}
@keyframes inL{from{transform:translateX(-3.5%);opacity:0}to{transform:none;opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

header.hdr{background:var(--navy);height:clamp(44px,5.2vh,60px);display:flex;align-items:center;
  padding:0 var(--pad);justify-content:space-between;flex-shrink:0}
.hdr-b{font-size:var(--fs-xs);font-weight:500;color:#A8C4E8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-badge{background:var(--blue);color:#fff;font-size:var(--fs-xs);font-weight:800;
  padding:6px clamp(12px,1.8vw,22px);border-radius:6px;letter-spacing:.08em;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;margin-left:14px}

footer.ftr{background:var(--warm);border-top:2px solid var(--border);height:clamp(36px,4vh,48px);
  display:flex;align-items:center;padding:0 var(--pad);justify-content:space-between;flex-shrink:0}
.ftr span{font-size:var(--fs-xs);color:var(--text3);font-weight:500}

main.body {
  flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0; scroll-behavior: smooth;
  padding: clamp(16px,2.2vh,28px) var(--pad) clamp(12px,1.5vh,20px);
  display: flex; flex-direction: column; gap: var(--gap);
}
main.body::-webkit-scrollbar { width: 6px; }
main.body::-webkit-scrollbar-track { background: transparent; }
main.body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
main.body::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }

/* ── PORTADA ─────────────────────────────────────────── */
.s-portada{background:var(--red)}
.portada-inner{width:100%;max-width:1400px;margin:0 auto;
  padding:clamp(36px,6vh,80px) clamp(48px,7vw,100px);
  display:flex;flex-direction:column;gap:clamp(16px,2.8vh,32px)}
.p-ie{font-size:var(--fs-sm);color:rgba(255,210,210,.85);text-align:center;letter-spacing:.05em}
.p-area{font-size:var(--fs-md);font-weight:700;color:rgba(255,210,210,.95);
  text-align:center;letter-spacing:.16em;text-transform:uppercase}
.p-title{font-family:'DM Serif Display',serif;font-size:var(--fs-3xl);
  color:#fff;text-align:center;line-height:1.05;animation:fadeUp .9s .1s both}
.p-sub{font-size:var(--fs-xl);color:rgba(255,220,220,.9);text-align:center;
  font-style:italic;animation:fadeUp .9s .25s both}
.p-divider{height:3px;background:rgba(255,255,255,.25);border-radius:2px; margin:clamp(8px,1.5vh,14px) 0}
.p-card-grid{display:grid;grid-template-columns:repeat(3,1fr);
  gap:clamp(12px,1.4vw,20px);animation:fadeUp .9s .4s both}
.p-card{background:rgba(255,255,255,.09);border:2px solid rgba(255,255,255,.18);
  border-radius:14px;padding:clamp(18px,2.2vh,30px) clamp(14px,1.8vw,24px);
  display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.p-card-num{width:clamp(48px,5vw,64px);height:clamp(48px,5vw,64px);border-radius:50%;
  background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;
  font-size:var(--fs-lg);font-weight:700;color:#fff}
.p-card-title{font-size:var(--fs-lg);font-weight:700;color:#fff;line-height:1.15}
.p-card-sub{font-size:var(--fs-sm);color:rgba(255,210,210,.8);font-style:italic;line-height:1.4}
.p-docente{font-size:var(--fs-sm);color:rgba(255,200,200,.7);text-align:right;font-style:italic}

/* ── ELEMENTOS DE SLIDES ─────────────────────────────── */
.title-row{display:flex;align-items:flex-start;gap:16px}
.accent-bar{width:clamp(10px,1vw,14px);border-radius:6px;flex-shrink:0;align-self:stretch;min-height:48px}
.slide-title{font-family:'DM Serif Display',serif;
  font-size:var(--fs-xl);color:var(--navy);line-height:1.08}
.slide-instr{font-size:var(--fs-md);color:var(--text2);font-style:italic;margin-top:6px;line-height:1.4}
.badge{display:inline-flex;align-items:center;font-size:var(--fs-sm);font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;padding:6px 16px;border-radius:6px;margin-bottom:4px}

.activacion-previa{
  background:var(--warm);border-left:5px solid var(--blue-mid);
  border-radius:0 10px 10px 0;padding:clamp(14px,1.6vh,22px) clamp(16px,2vw,28px);
  font-size:var(--fs-md);color:var(--text2);margin-bottom:var(--gap);font-style:italic}
.activacion-previa strong{color:var(--navy);font-style:normal}

.det-box{background:#FFF8ED;border:3px solid var(--amber);border-radius:14px;
  padding:clamp(16px,2vh,24px) clamp(18px,2.2vw,30px);
  display:flex;flex-direction:column;gap:clamp(10px,1.4vh,16px)}
.det-label{font-size:var(--fs-sm);font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;color:var(--amber)}
.det-text{font-family:'DM Serif Display',serif;
  font-size:var(--fs-lg);color:var(--text);line-height:1.55;font-style:italic}
.det-q{font-size:var(--fs-xl);font-weight:800;color:var(--navy);line-height:1.35}

/* ── PASO A PASO (YO HAGO) ────────────────────────────── */
.paso-row{display:flex;align-items:center;gap:clamp(12px,1.4vw,20px);
  background:#fff;border:2px solid var(--border);border-radius:12px;
  padding:clamp(12px,1.4vh,20px) clamp(16px,2vw,26px);border-left:6px solid var(--red);
  opacity:0;transform:translateY(14px);transition:opacity .4s,transform .4s}
.paso-row.vis{opacity:1;transform:none}
.paso-num{width:clamp(32px,3.4vw,48px);height:clamp(32px,3.4vw,48px);border-radius:50%;
  background:var(--red);display:flex;align-items:center;justify-content:center;
  font-size:var(--fs-md);font-weight:800;color:#fff;flex-shrink:0}
.paso-lbl{font-size:var(--fs-sm);font-weight:800;color:var(--red);
  flex-shrink:0;min-width:clamp(110px,12vw,160px)}
.paso-body{font-size:var(--fs-md);color:var(--text);flex:1;line-height:1.4}
.paso-note{font-size:var(--fs-xs);color:var(--text3);font-style:italic;
  text-align:right;flex-shrink:0}

.result-bar{background:var(--navy);border-radius:12px;
  padding:clamp(14px,1.8vh,24px) clamp(18px,2.2vw,30px);
  display:flex;align-items:center;justify-content:center;gap:20px;
  font-size:var(--fs-2xl);font-weight:800;color:var(--amber-b);text-align:center;
  opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s}
.result-bar.vis{opacity:1;transform:none}

/* ── FORMAL BOX ──────────────────────────────────────── */
.formal-box{background:var(--warm);border:3px solid var(--red);border-radius:14px;
  padding:clamp(16px,2vh,28px) clamp(18px,2.2vw,32px);
  display:flex;flex-direction:column;gap:clamp(14px,1.8vh,22px);align-items:stretch}
.formal-title{font-size:var(--fs-lg);font-weight:800;color:var(--red);text-align:center}
.formal-step{background:#fff;border:2px solid var(--border);border-radius:10px;
  padding:clamp(12px,1.4vh,20px) clamp(16px,2vw,24px);
  display:flex;align-items:center;gap:16px;width:100%;
  opacity:0;transition:opacity .4s}
.formal-step.vis{opacity:1}
.formal-step-n{width:clamp(32px,3.4vw,44px);height:clamp(32px,3.4vw,44px);border-radius:50%;
  background:var(--red);display:flex;align-items:center;justify-content:center;
  font-size:var(--fs-md);font-weight:800;color:#fff;flex-shrink:0}
.formal-step-txt{font-size:var(--fs-md);color:var(--text);line-height:1.4}
.conj-box{background:#FCE4E4;border:3px solid var(--red);border-radius:12px;
  padding:clamp(12px,1.4vh,20px) clamp(16px,2vw,24px);
  font-size:var(--fs-md);color:var(--red);font-style:italic;line-height:1.5;
  opacity:0;transition:opacity .4s}
.conj-box.vis{opacity:1}

/* ── FICHAS ALGEBRAICAS ──────────────────────────────── */
.fichas-layout{display:flex;gap:var(--gap);align-items:flex-start;flex-wrap:wrap}
.fichas-panel{background:var(--navy);border-radius:14px;
  padding:clamp(18px,2.2vh,28px) clamp(18px,2.2vw,28px);
  display:flex;flex-direction:column;gap:clamp(12px,1.4vh,18px);
  flex:0 0 auto;min-width:clamp(220px,22vw,300px)}
.fichas-title{font-size:var(--fs-xs);font-weight:800;color:#A8C4E8;
  text-transform:uppercase;letter-spacing:.12em;text-align:center}
.fichas-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ficha{display:inline-flex;align-items:center;justify-content:center;
  border-radius:8px;font-weight:800;font-size:var(--fs-md);
  width:clamp(44px,4.8vw,66px);height:clamp(44px,4.8vw,66px);
  border:3px solid rgba(255,255,255,.3);color:#fff;
  transition:transform .2s}
.ficha:hover{transform:scale(1.08)}
.ficha-x2{background:#1C3A6E}
.ficha-x{background:#2E75B6}
.ficha-1{background:#2E7D32}
.ficha-neg{background:#7B1818}
.fichas-legend{font-size:var(--fs-xs);color:rgba(255,255,255,.6);text-align:center;font-style:italic}

/* ── TARJETAS HACEMOS / TÚ HACES ─────────────────────── */
.ex-card{background:#fff;border-radius:14px;border:2.5px solid var(--border);
  border-top:6px solid transparent;
  padding:clamp(14px,1.8vh,22px) clamp(14px,1.8vw,22px);
  display:flex;flex-direction:column;gap:clamp(10px,1.2vh,14px);
  opacity:0;transform:translateY(16px);transition:opacity .45s,transform .45s}
.ex-card.vis{opacity:1;transform:none}
.ex-head{display:flex;align-items:center;gap:14px}
.ex-num{width:clamp(32px,3.4vw,48px);height:clamp(32px,3.4vw,48px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:var(--fs-md);color:#fff;flex-shrink:0}
.ex-title{font-size:var(--fs-md);font-weight:800;color:var(--text)}
.ex-ctx{font-size:var(--fs-sm);color:var(--text2);font-style:italic;line-height:1.4}
.ex-task{background:var(--warm);border-radius:10px;
  padding:clamp(12px,1.4vh,18px) clamp(14px,1.8vw,20px);
  font-size:var(--fs-md);font-weight:800;color:var(--navy);text-align:center;
  border:2px solid var(--border)}

/* ── TABLA COMPARATIVA SUMA / RESTA ─────────────────── */
.comp-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.comp-table th{background:var(--red);color:#fff;
  padding:clamp(10px,1.2vh,16px) clamp(12px,1.5vw,20px);text-align:left}
.comp-table td{padding:clamp(10px,1.2vh,15px) clamp(12px,1.5vw,20px);
  border-bottom:2px solid var(--border);color:var(--text);
  vertical-align:top;line-height:1.4}
.comp-table tr:nth-child(even) td{background:#fff}
.comp-table tr:nth-child(odd) td{background:var(--warm)}
.comp-table td:first-child{font-weight:800;color:var(--red);background:#FCE4E4!important}
.comp-table tr.tabla-row{opacity:0;transition:opacity .4s}
.comp-table tr.tabla-row.vis{opacity:1}

/* ── ERROR BOX ───────────────────────────────────────── */
.error-box{background:#FFF0F0;border:3px solid var(--red-b);border-radius:14px;
  padding:clamp(14px,1.8vh,22px) clamp(16px,2vw,26px);
  display:flex;flex-direction:column;gap:clamp(8px,1vh,12px)}
.error-title{font-size:var(--fs-sm);font-weight:800;color:var(--red-b)}
.error-txt{font-size:var(--fs-sm);color:var(--text);line-height:1.55}
.error-row{opacity:0;transition:opacity .4s}
.error-row.vis{opacity:1}

/* ── METACOGNICIÓN ───────────────────────────────────── */
.meta-q{background:#E0F2F1;border:3px solid var(--teal);border-radius:14px;
  padding:clamp(14px,1.8vh,24px) clamp(16px,2vw,28px)}
.meta-qlbl{font-size:var(--fs-sm);font-weight:800;color:var(--teal);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.meta-qtxt{font-family:'DM Serif Display',serif;font-size:var(--fs-lg);
  color:var(--text);font-style:italic;line-height:1.5}

.semaforo{display:flex;flex-direction:column;gap:clamp(10px,1.2vh,16px);margin-top:var(--gap)}
.sema-item{display:flex;align-items:flex-start;gap:clamp(14px,1.6vw,22px);
  background:#fff;border:2px solid var(--border);border-radius:12px;
  padding:clamp(12px,1.4vh,18px) clamp(14px,1.8vw,22px);
  opacity:0;transform:translateY(10px);transition:opacity .4s,transform .4s}
.sema-item.vis{opacity:1;transform:none}
.sema-circle{width:clamp(36px,4vw,54px);height:clamp(36px,4vw,54px);border-radius:50%;flex-shrink:0}
.sema-txt{font-size:var(--fs-md);color:var(--text);font-weight:600;line-height:1.4}
.sema-sub{display:block;font-size:var(--fs-xs);color:var(--text3);font-weight:400;
  font-style:italic;margin-top:6px}

/* ── RECURSOS AUDIOVISUALES ─────────────────────────── */
.video-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap)}
.video-card{background:#fff;border:2.5px solid var(--border);border-radius:14px;
  padding:clamp(14px,1.8vh,22px) clamp(16px,2vw,26px);
  display:flex;flex-direction:column;gap:12px;border-top:5px solid var(--red)}
.video-lbl{font-size:var(--fs-xs);font-weight:800;color:var(--red);
  text-transform:uppercase;letter-spacing:.1em}
.video-title{font-size:var(--fs-md);font-weight:700;color:var(--navy);line-height:1.35}
.video-desc{font-size:var(--fs-sm);color:var(--text2);line-height:1.5;font-style:italic}
.video-link{display:inline-flex;align-items:center;gap:8px;
  background:var(--red);color:#fff;text-decoration:none;
  padding:8px 18px;border-radius:8px;font-size:var(--fs-sm);font-weight:700;
  align-self:flex-start;transition:background .2s}
.video-link:hover{background:var(--red-b)}

/* ── CHECKPOINT / PISTA ──────────────────────────────── */
.checkpoint{background:#E8F4FD;border:2.5px solid var(--blue-mid);border-radius:12px;
  padding:clamp(12px,1.4vh,18px) clamp(14px,1.8vw,22px);
  margin:var(--gap) 0;font-size:var(--fs-sm); line-height:1.6}
.checkpoint strong{color:var(--navy);display:block;margin-bottom:8px}
.checkpoint .pista{background:#fff;padding:10px 14px;border-radius:8px;margin-top:10px;
  border-left:4px solid var(--amber);font-style:italic;color:var(--text2)}
.checkpoint button{background:var(--blue-mid);color:#fff;border:none;padding:6px 14px;
  border-radius:6px;font-size:var(--fs-xs);cursor:pointer;margin-top:8px; font-weight:600}
.checkpoint button:hover{background:var(--blue)}

.btn-ayuda,.btn-desafio{
  font-size:var(--fs-xs);padding:8px 16px;border-radius:24px;
  border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
  transition:transform .1s,box-shadow .2s; font-weight:600}
.btn-ayuda{background:#E8F5E9;color:var(--green);border:2.5px solid var(--green)}
.btn-ayuda:hover{background:#C8E6C9;transform:translateY(-2px);box-shadow:0 4px 8px rgba(0,0,0,0.1)}
.btn-desafio{background:#FFF3E0;color:var(--amber);border:2.5px solid var(--amber)}
.btn-desafio:hover{background:#FFE0B2;transform:translateY(-2px);box-shadow:0 4px 8px rgba(0,0,0,0.1)}
.contenido-ayuda,.contenido-desafio{
  display:none;background:var(--warm);border-radius:10px;
  padding:clamp(12px,1.4vh,18px) clamp(14px,1.8vw,22px);
  margin:10px 0;font-size:var(--fs-sm);border-left:5px solid var(--blue-mid); line-height:1.6}
.contenido-ayuda.visible,.contenido-desafio.visible{display:block;animation:fadeUp .3s}

/* ── EVIDENCIA / EXPORTAR ─────────────────────────────── */
.evidencia-box{background:#EBF4FB;border:2.5px solid var(--blue-mid);border-radius:14px;
  padding:clamp(14px,1.8vh,20px) clamp(16px,2vw,26px);
  margin-top:var(--gap);display:none;animation:fadeUp .4s}
.evidencia-box.visible{display:block}
.evidencia-box h4{font-size:var(--fs-md);color:var(--navy);margin-bottom:10px;font-weight:800}
.evidencia-box ul{padding-left:24px;font-size:var(--fs-sm);color:var(--text2);line-height:1.7}
.btn-exportar{background:var(--blue);color:#fff;border:none;
  padding:10px 22px;border-radius:8px;font-size:var(--fs-sm);
  font-weight:700;cursor:pointer;margin-top:12px;transition:background .2s}
.btn-exportar:hover{background:var(--navy)}

/* ── SOC FML (fórmula definición en caja) ────────────── */
.soc-fml{background:var(--warm);border:3px solid var(--red);border-radius:14px;
  padding:clamp(16px,2vh,28px) clamp(18px,2.2vw,32px);
  text-align:center;font-size:var(--fs-xl);color:var(--navy);
  opacity:0;transition:opacity .4s}
.soc-fml.vis{opacity:1}

/* ── COLUMNA 2 PARA SLIDE DE FORMALIZACIÓN ─────────────── */
.two-col{display:flex;gap:var(--gap);align-items:flex-start;flex-wrap:wrap}
.two-col > *{flex:1;min-width:min(100%, 300px)}

<script>
function announceToScreenReader(message) {
  const region = document.getElementById('live-region');

}
function showFeedback(message, isError = false) {

function saveProgress(slideIndex, clicks) {

  catch(e) { console.warn('No se pudo guardar el progreso:', e); }
}
function loadProgress() {
  try {
    const saved = localStorage.getItem('algebra8_s4_progress_v2');
    if (saved) {
      const data = JSON.parse(saved);
      if (Date.now() - data.timestamp < 86400000 && typeof data.slide === 'number' && data.slide >= 0 && data.slide < SLIDES.length) return data;

  } catch(e) {}
  return null;
}
function toggleContent(btn, targetClass) {
  const card = btn.closest('.ex-card') || btn.closest('.formal-box') || document.body;

  if (content) {
    content.classList.toggle('visible');
    const isExpanded = content.classList.contains('visible');
    btn.setAttribute('aria-expanded', isExpanded);
  }
}

  const pista = btn.nextElementSibling;
  if(pista && pista.classList.contains('pista')) {

  const input = document.querySelector(selector);
  if (!input) return;
  const valor = input.value.trim().replace(/\s+/g,'');
  const exp = esperada.toString().trim().replace(/\s+/g,'');
  if (valor === exp) {
    showFeedback('¡Correcto! 🎉');

    showFeedback('Revisa los términos semejantes y los signos.', true);

  }
}
function verificarPolinomio(inputId, esperadas) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const norm = s => s.toLowerCase()
    .replace(/\s+/g,'')
    .replace(/²/g,'^2').replace(/³/g,'^3')
    .replace(/\*\*/g,'^').replace(/\*/g,'')
    .replace(/−/g,'-').replace(/–/g,'-');
  const valor = norm(input.value);
  if (!valor) { showFeedback('Escribe primero tu respuesta 💡', true); return; }
  const ok = esperadas.some(e => norm(e) === valor);
  if (ok) {
    showFeedback('¡Correcto! 🎉 Coeficientes y signos perfectos.');
    input.style.borderColor='var(--green)'; input.style.backgroundColor='#E8F5E9';
  } else {
    showFeedback('Aún no. Revisa términos semejantes, signos y el orden descendente.', true);
    input.style.borderColor='var(--red)'; input.style.backgroundColor='#FFF0F0';
  }
}
/* ── RETO GENERADOR DE POLINOMIOS ── */
function _rndNZ(a, b) {
  let v = 0;
  while (v === 0) v = Math.floor(Math.random() * (b - a + 1)) + a;
  return v;
}
function _polyToStr(c) { // c = [a, b, k] para ax^2 + bx + k
  const parts = [];
  const push = (coef, lit) => {
    if (coef === 0) return;
    let s;
    if (lit) s = (coef === 1 ? '' : coef === -1 ? '-' : String(coef)) + lit;
    else s = String(coef);
    parts.push(s);
  };
  push(c[0], 'x^2'); push(c[1], 'x'); push(c[2], '');
  if (!parts.length) return '0';
  return parts.map((p, i) => i === 0 ? p : (p.startsWith('-') ? p : '+' + p)).join('');
}
function renderReto() {
  const disp = document.getElementById('reto-display');
  if (!disp || !window._reto || !window._reto.P) return;
  disp.innerHTML = '\\(P = ' + _polyToStr(window._reto.P) + '\\)\u00A0\u00A0\u00A0·\u00A0\u00A0\u00A0\\(Q = ' + _polyToStr(window._reto.Q) + '\\)';
  doKatex(disp);
}
function generarReto() {
  const P = [_rndNZ(-4, 4), _rndNZ(-7, 7), _rndNZ(-9, 9)];
  const Q = [_rndNZ(-4, 4), _rndNZ(-7, 7), _rndNZ(-9, 9)];
  if (P[0] === Q[0] && P[1] === Q[1] && P[2] === Q[2]) Q[2] += (Q[2] === 9 ? -1 : 1); // evitar P−Q = 0
  window._reto = {
    P, Q,
    suma:  _polyToStr([P[0] + Q[0], P[1] + Q[1], P[2] + Q[2]]),
    resta: _polyToStr([P[0] - Q[0], P[1] - Q[1], P[2] - Q[2]])
  };
  renderReto();
  ['in-reto-suma', 'in-reto-resta'].forEach(id => {
    const i = document.getElementById(id);
    if (i) { i.value = ''; i.style.borderColor = 'var(--border)'; i.style.backgroundColor = '#fff'; }
  });
}
function verificarReto(tipo, inputId) {
  const esperado = window._reto && window._reto[tipo];
  if (!esperado) { showFeedback('Primero genera un reto 🎲', true); return; }
  // aceptar también la variante con coeficiente 1 explícito (1x^2, -1x)
  const conUnos = esperado.replace(/(^|[+\-])x/g, (m, g) => g + '1x');
  verificarPolinomio(inputId, [esperado, conUnos]);
}

function exportarEvidencia() {
  const respuestas = [];
  document.querySelectorAll('.espacio-respuesta').forEach((el, i) => { if(el.textContent.trim()) respuestas.push(`Espacio ${i+1}: ${el.textContent.trim()}`); });
  if(respuestas.length === 0) { showFeedback('Escribe primero en los espacios de respuesta 💡', true); return; }
  const contenido = `EVIDENCIAS - Álgebra 8° - Suma y Resta de Polinomios\n${new Date().toLocaleString('es-CO')}\n\n${respuestas.join('\n\n---\n\n')}`;
  try {
    const blob = new Blob([contenido], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `algebra8_s4_evidencias_${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showFeedback('📥 Evidencias guardadas');
  } catch(e) { navigator.clipboard?.writeText(contenido); showFeedback('📋 Copiado al portapapeles'); }
}

  }

  showFeedback('💾 Reflexión guardada');
}

/* ── 6 · FORMALIZACIÓN ───────────────────────────────────── */
{bread:'Sem. 4  ·  Polinomios  ›  Formalización',badge:'FORMALIZACIÓN',badgeColor:'#2E7D32',clicks:5,fL:'Sem. 4 · Sesión 2 — Formalización',html:`
<div class="title-row">
  <div class="accent-bar" style="background:var(--green)"></div>
  <div style="flex:1">
    <div class="badge" style="background:var(--green);color:#fff">Formalización</div>
    <div class="slide-title">Definición y procedimiento general</div>
    <div class="slide-instr">Completa en tu cuaderno <strong>antes</strong> de que aparezca cada recuadro. (PPT animado)</div>
  </div>
</div>
<div class="formal-box">
  <div class="formal-title">Reglas para sumar y restar polinomios</div>
  <div class="formal-step" data-fs="1">
    <div class="formal-step-n">1</div>
    <div class="formal-step-txt"><strong>Suma:</strong> elimina los paréntesis <em>sin cambiar ningún signo</em>. Luego reduce términos semejantes.</div>
  </div>
  <div class="formal-step" data-fs="2">
    <div class="formal-step-n">2</div>
    <div class="formal-step-txt"><strong>Resta:</strong> distribuye el signo «−» sobre <em>cada término</em> del segundo polinomio (cambia todos los signos). Luego reduce términos semejantes.</div>
  </div>
  <div class="formal-step" data-fs="3">
    <div class="formal-step-n">3</div>
    <div class="formal-step-txt"><strong>Propiedad:</strong> solo se operan los <em>coeficientes</em> de términos con la misma parte literal. La parte literal no cambia.</div>
  </div>
  <div class="formal-step" data-fs="4">
    <div class="formal-step-n">4</div>
    <div class="formal-step-txt"><strong>Orden:</strong> el resultado se escribe en orden descendente de grado del exponente.</div>
  </div>
</div>
<div class="soc-fml" id="fml-general" style="margin-top:10px">
  Si \\(P = a_n x^n + \\cdots + a_1 x + a_0\\) y \\(Q = b_n x^n + \\cdots + b_1 x + b_0\\), entonces:<br><br>
  \\(P + Q = (a_n+b_n)x^n + \\cdots + (a_1+b_1)x + (a_0+b_0)\\)<br>
  \\(P - Q = (a_n-b_n)x^n + \\cdots + (a_1-b_1)x + (a_0-b_0)\\)
</div>`,

/* ═══════════════════════════════════════════════════════════
   MOTOR DE PRESENTACIÓN
═══════════════════════════════════════════════════════════ */
let cur=0,clicks=0;
const deck=document.getElementById('deck');
const savedProgress = loadProgress();
if(savedProgress) { cur = savedProgress.slide; clicks = savedProgress.clicks; }

function buildSlide(idx){
  const s=SLIDES[idx];
  const d=document.createElement('div');
  d.className='slide'+(s.cls?' '+s.cls:'');
  d.setAttribute('role','region');
  d.setAttribute('aria-label',`Diapositiva ${idx+1} de ${SLIDES.length}`);
  let h='';
  if(!s.noH){
    const bc=s.badgeColor||'var(--blue)';
    h+=`<header class="hdr"><span class="hdr-b">${s.bread||''}</span>${s.badge?`<span class="hdr-badge" style="background:${bc}">${s.badge}</span>`:''}</header>`;
  }
  h+=`<main class="body">${s.html}</main>`;
  if(!s.noF) h+=`<footer class="ftr"><span>${s.fL||''}</span><span>I.E. Merceditas Gómez Martínez · Álgebra 8°</span></footer>`;
  d.innerHTML=h; return d;
}

function show(idx,dir){
  const prev=deck.querySelector('.slide.active');
  if(prev){prev.classList.remove('active','enter-r','enter-l');}
  const el=buildSlide(idx); deck.appendChild(el);
  const all=deck.querySelectorAll('.slide'); if(all.length>3) all[0].remove();
  requestAnimationFrame(()=>{
    el.classList.add('active',dir>=0?'enter-r':'enter-l');
    setTimeout(()=>el.classList.remove('enter-r','enter-l'),360);
    doKatex(el); if(SLIDES[idx].onEnter) SLIDES[idx].onEnter();
    const title=el.querySelector('.slide-title');
    if(title) announceToScreenReader(`Diapositiva ${idx+1}: ${title.textContent}`);
    else announceToScreenReader(`Diapositiva ${idx+1} de ${SLIDES.length}`);
    const main=el.querySelector('main.body');
    if(main) main.scrollTop=0;
  });
  clicks=0;
  document.getElementById('ncnt').textContent=`${idx+1} / ${SLIDES.length}`;
  document.getElementById('pbar').style.width=(((idx+1)/SLIDES.length)*100)+'%';
  document.getElementById('pbar').setAttribute('aria-valuenow',idx+1);
  saveProgress(idx,0);
}

function doKatex(el){
  if(window.renderMathInElement){
    try{
      renderMathInElement(el,{
        delimiters:[
          {left:'\\(',right:'\\)',display:false},
          {left:'\\[',right:'\\]',display:true},
          {left:'$$',right:'$$',display:true},
          {left:'$',right:'$',display:false}
        ],
        throwOnError:false
      });
    }catch(e){ console.warn('KaTeX error:',e); }
  } else {
    // KaTeX not ready yet — queue for when it loads
    document.addEventListener('katex-ready', function onKR(){
      document.removeEventListener('katex-ready', onKR);
      if(window.renderMathInElement){
        try{
          renderMathInElement(el,{
            delimiters:[
              {left:'\\(',right:'\\)',display:false},
              {left:'\\[',right:'\\]',display:true},
              {left:'$$',right:'$$',display:true},
              {left:'$',right:'$',display:false}
            ],
            throwOnError:false
          });
        }catch(e){ console.warn('KaTeX error:',e); }
      }
    });
  }
}

function advance(){
  const s=SLIDES[cur];
  const maxClicks=s.clicks||0;
  if(clicks<maxClicks){
    clicks++;
    if(s.onReveal) s.onReveal(clicks);
    announceToScreenReader(`Paso ${clicks} de ${maxClicks}`);
    saveProgress(cur,clicks);
    return;
  }
  if(cur<SLIDES.length-1){ cur++; show(cur,1); }
  else { showFeedback('¡Semana 4 completada! 🎉 Revisa tus evidencias guardadas.'); }
}
function retreat(){ if(cur>0){ cur--; show(cur,-1); } }

document.addEventListener('keydown',e=>{
  const t=e.target;
  if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)) return;
  if(['Space','ArrowRight','ArrowLeft'].includes(e.code)) e.preventDefault();
  if(e.code==='Space'||e.code==='ArrowRight') advance();
  if(e.code==='ArrowLeft') retreat();
  if(e.code==='KeyF') document.getElementById('fs-btn')?.click();
});

const btnNext=document.getElementById('bn');
const btnPrev=document.getElementById('bp');
if(btnNext) btnNext.addEventListener('click',advance);
if(btnPrev) btnPrev.addEventListener('click',retreat);

let tx=0;
document.addEventListener('touchstart',e=>{if(e.touches?.[0]) tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const touch=e.changedTouches?.[0]; if(!touch) return;
  const dx=touch.clientX-tx;
  if(Math.abs(dx)>50){dx<0?advance():retreat();}
});

const fsBtn=document.getElementById('fs-btn');
if(fsBtn){
  fsBtn.addEventListener('click',async()=>{
    try{
      if(!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    }catch(err){showFeedback('Pantalla completa no disponible en este dispositivo',true);}
  });
  document.addEventListener('fullscreenchange',()=>{
    if(fsBtn) fsBtn.textContent=document.fullscreenElement?'✕':'⛶';
    fsBtn?.setAttribute('aria-label',document.fullscreenElement?'Salir de pantalla completa':'Entrar en pantalla completa');
  });
}

// Arrancar presentación — con fallback robusto
function iniciar() {
  try {
    const idx = (savedProgress && savedProgress.slide < SLIDES.length) ? savedProgress.slide : 0;
    show(idx, 1);
  } catch(e) {
    console.error('Error al iniciar presentación:', e);
    try { show(0, 1); } catch(e2) { console.error('Error crítico:', e2); }
  }
}

setTimeout(()=>{const hint=document.getElementById('hint');if(hint)hint.style.opacity='0';},5000);
// katex-ready is handled inside doKatex() with per-element queuing
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', iniciar);
} else {
  iniciar();
}
window.addEventListener('beforeunload',()=>{const saved=loadProgress();if(saved&&Date.now()-saved.timestamp>86400000) localStorage.removeItem('algebra8_s4_progress_v2');});
</script>
